name: Check install and app launch
on:
    push:
    pull_request:
jobs:
    uv-example:
        name: python
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7

            - name: Install uv
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

            - name: Set up Python
              run: uv python install
            - name: Install dependencies
              run: uv sync
            - name: Run the APP
              run: |
                  timeout 30 uv run app.py &
                  APP_PID=$!
                  # Wait up to 20 s for Gradio's "Running on" message
                  for i in $(seq 1 20); do
                      sleep 1
                      if kill -0 $APP_PID 2>/dev/null; then
                          echo "App still running after ${i}s – OK"
                      else
                          echo "App exited unexpectedly" >&2
                          exit 1
                      fi
                  done
                  kill $APP_PID
                  echo "Smoke test passed."
